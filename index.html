<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio · Kontaktbogen</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grain"></div>

<div class="app" id="app">

  <!-- ============ HOME VIEW ============ -->
  <section id="view-home" class="view fade-in">
    <header class="home-header">
      <div class="home-header-top">
        <div>
          <h1 class="display-title">Portfolio</h1>
          <p class="meta-line" id="home-meta">0 Mappen · Kontaktbogen-Index</p>
        </div>
      </div>
      <p class="empty-hint" id="home-empty-hint" hidden>
        Lege deine erste Mappe an und lade Bilder hoch, um dein Portfolio zu starten.
      </p>
    </header>

    <div class="grid" id="folder-grid"></div>
  </section>

  <!-- ============ GALLERY VIEW ============ -->
  <section id="view-gallery" class="view fade-in" hidden>
    <button class="back-link" id="btn-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Zurück zum Index
    </button>

    <div class="gallery-header">
      <div>
        <h1 class="display-title editable" id="gallery-title" title="Klicken, um den Namen zu ändern"></h1>
        <p class="meta-line" id="gallery-meta"></p>
      </div>
    </div>


    <div class="grid grid-images" id="image-grid"></div>
  </section>

</div>

<!-- ============ LIGHTBOX ============ -->
<div id="lightbox" class="lightbox" hidden>
  <button class="lb-close" id="lb-close" aria-label="Schließen">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
  <button class="lb-prev" id="lb-prev" aria-label="Vorheriges Bild">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <button class="lb-next" id="lb-next" aria-label="Nächstes Bild">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
  </button>
  <img id="lb-image" class="lb-image" src="" alt="">
  <div class="lb-caption" id="lb-caption"></div>
</div>

<!-- ============ CONFIRM DIALOG ============ -->
<div id="confirm-overlay" class="confirm-overlay" hidden>
  <div class="confirm-box">
    <h3 id="confirm-title"></h3>
    <p id="confirm-message"></p>
    <div class="confirm-actions">
      <button class="btn-ghost" id="confirm-cancel">Abbrechen</button>
      <button class="btn-accent" id="confirm-ok">Löschen</button>
    </div>
  </div>
</div>

<!-- ============ STORAGE WARNING TOAST ============ -->
<div id="toast" class="toast" hidden>
  <span id="toast-text">Speichern war nicht möglich — Änderungen bleiben eventuell nicht erhalten.</span>
  <button id="toast-close" aria-label="Hinweis schließen">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
</div>


<script src="app.js"></script>
</body>
</html>
